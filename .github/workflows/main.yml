name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Validate ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: web-ext installieren
        run: npm install -g web-ext

      - name: Addon validieren
        run: web-ext lint --source-dir . --ignore-files ".github/**" "generate-icons.js"

  # ─── Build & Artifact ───────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: web-ext installieren
        run: npm install -g web-ext

      - name: Addon bauen (.zip)
        run: |
          web-ext build \
            --source-dir . \
            --artifacts-dir ./dist \
            --ignore-files ".github/**" "generate-icons.js" "dist/**" \
            --overwrite-dest

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: addon-zip
          path: dist/*.zip
          retention-days: 30

  # ─── Release (nur bei Tag v*) ────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: web-ext installieren
        run: npm install -g web-ext

      - name: Version aus manifest.json lesen
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Addon bauen
        run: |
          web-ext build \
            --source-dir . \
            --artifacts-dir ./dist \
            --ignore-files ".github/**" "generate-icons.js" "dist/**" \
            --overwrite-dest

      # Optional: AMO-Signierung (benötigt Secrets AMO_API_KEY + AMO_API_SECRET)
      # Secrets in GitHub → Settings → Secrets and Variables → Actions eintragen
      - name: Addon signieren (AMO)
        if: ${{ env.AMO_API_KEY != '' }}
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          web-ext sign \
            --source-dir . \
            --artifacts-dir ./dist \
            --ignore-files ".github/**" "generate-icons.js" "dist/**" \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET"

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: "Linux Passkey Manager v${{ steps.version.outputs.version }}"
          body: |
            ## Linux Passkey Manager v${{ steps.version.outputs.version }}

            ### Installation
            1. Firefox öffnen → `about:addons`
            2. Zahnrad → **Add-on aus Datei installieren**
            3. `.xpi` Datei auswählen

            > Ohne AMO-Signierung: Firefox Developer Edition + `xpinstall.signatures.required = false` in `about:config`
          files: dist/*
          draft: false
          prerelease: false
